<!DOCTYPE html>
<html>

<head>
    <title>Update Review</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Update Review</h2>

    <a href="{% url 'review_dashboard' %}" class="btn btn-secondary mb-3">
        Back
    </a>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label>Review Title</label>
            <input type="text"
                   name="review_title"
                   value="{{ review.review_title }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Review Date</label>
            <input type="date"
                   name="review_date"
                   value="{{ review.review_date|date:'Y-m-d' }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Review Period</label>

            <select name="review_period" class="form-control">

                <option value="Monthly"
                    {% if review.review_period == 'Monthly' %}selected{% endif %}>
                    Monthly
                </option>

                <option value="Quarterly"
                    {% if review.review_period == 'Quarterly' %}selected{% endif %}>
                    Quarterly
                </option>

                <option value="Annual"
                    {% if review.review_period == 'Annual' %}selected{% endif %}>
                    Annual
                </option>

            </select>

        </div>

        <div class="mb-3">
            <label>Rating</label>
            <input type="number"
                   min="1"
                   max="10"
                   name="rating"
                   value="{{ review.rating }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Comments</label>

            <textarea name="comments"
                      rows="4"
                      class="form-control">{{ review.comments }}</textarea>

        </div>

        <button type="submit" class="btn btn-success">
            Update Review
        </button>

    </form>

</div>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>Update Leave Quota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Update Leave Quota</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label>Employee</label>
            <input type="text"
                   class="form-control"
                   value="{{ quota.employee }}"
                   readonly>
        </div>

        <div class="mb-3">
            <label>Leave Type</label>
            <input type="text"
                   class="form-control"
                   value="{{ quota.leave_type }}"
                   readonly>
        </div>

        <div class="mb-3">
            <label>Total Quota</label>
            <input type="number"
                   step="0.5"
                   name="total_quota"
                   value="{{ quota.total_quota }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Used Quota</label>
            <input type="number"
                   step="0.5"
                   name="used_quota"
                   value="{{ quota.used_quota }}"
                   class="form-control">
        </div>

        <button class="btn btn-success">
            Update Quota
        </button>

    </form>

</div>

</body>
</html>

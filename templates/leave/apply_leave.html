<!DOCTYPE html>
<html>

<head>

    <title>Apply Leave</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Apply Leave</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>Leave Type</label>

            <select
                name="leave_type"
                class="form-control">

                <option value="PL">
                    PL
                </option>

                <option value="CL">
                    CL
                </option>

                <option value="SL">
                    SL
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Reason</label>

            <textarea
                name="reason"
                class="form-control"></textarea>

        </div>

        <div class="mb-3">

            <label>From</label>

            <input
                type="date"
                name="start_date"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>To</label>

            <input
                type="date"
                name="end_date"
                class="form-control">

        </div>

        <button
            class="btn btn-success">

            Apply Leave

        </button>

    </form>

</div>

</body>

</html>

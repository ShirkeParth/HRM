<!DOCTYPE html>
<html>

<head>

    <title>Add Leave Quota</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Add Leave Quota</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>Employee</label>

            <select
                name="employee"
                class="form-control">

                {% for emp in employees %}

                <option
                    value="{{ emp.id }}">

                    {{ emp.first_name }}
                    {{ emp.last_name }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label>Leave Type</label>

            <select
                name="leave_type"
                class="form-control">

                <option value="PL">
                    PL
                </option>

                <option value="CL">
                    CL
                </option>

                <option value="SL">
                    SL
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Total Quota</label>

            <input
                type="number"
                step="0.5"
                name="total_quota"
                class="form-control">

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Save

        </button>

    </form>

</div>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

    <title>Approve Leave</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Leave Approval / Rejection</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>Employee</label>

            <input
                type="text"
                class="form-control"
                value="{{ leave.employee }}"
                readonly>

        </div>

        <div class="mb-3">

            <label>Leave Type</label>

            <input
                type="text"
                class="form-control"
                value="{{ leave.leave_type }}"
                readonly>

        </div>

        <div class="mb-3">

            <label>Reason</label>

            <textarea
                class="form-control"
                readonly>{{ leave.reason }}</textarea>

        </div>

        <div class="mb-3">

            <label>From</label>

            <input
                type="text"
                class="form-control"
                value="{{ leave.start_date }}"
                readonly>

        </div>

        <div class="mb-3">

            <label>To</label>

            <input
                type="text"
                class="form-control"
                value="{{ leave.end_date }}"
                readonly>

        </div>

        <div class="mb-3">

            <label>Status</label>

            <select
                name="status"
                class="form-control">

                <option value="Pending">
                    Pending
                </option>

                <option value="Approved">
                    Approved
                </option>

                <option value="Rejected">
                    Rejected
                </option>

            </select>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Save

        </button>

    </form>

</div>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>Update Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Update Employee</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>First Name</label>
                <input type="text"
                       name="first_name"
                       value="{{ employee.first_name }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Last Name</label>
                <input type="text"
                       name="last_name"
                       value="{{ employee.last_name }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email"
                       name="email"
                       value="{{ employee.email }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Mobile</label>
                <input type="text"
                       name="mobile"
                       value="{{ employee.mobile }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Department</label>

                <select name="dept" class="form-control">

                    {% for dept in departments %}
                    <option value="{{ dept.dept_id }}"
                    {% if dept.dept_id == employee.dept.dept_id %}
                    selected
                    {% endif %}
                    >
                        {{ dept.dept_name }}
                    </option>
                    {% endfor %}

                </select>

            </div>

            <div class="col-md-6 mb-3">
                <label>Role</label>

                <select name="role" class="form-control">

                    {% for role in roles %}
                    <option value="{{ role.id }}"
                    {% if role.id == employee.role.id %}
                    selected
                    {% endif %}
                    >
                        {{ role.role_name }}
                    </option>
                    {% endfor %}

                </select>

            </div>

            <div class="col-md-6 mb-3">
                <label>Reporting Manager</label>

                <select name="reporting_manager"
                        class="form-control">

                    {% for manager in managers %}
                    <option value="{{ manager.id }}"
                    {% if employee.reporting_manager and manager.id == employee.reporting_manager.id %}
                    selected
                    {% endif %}
                    >
                        {{ manager.first_name }}
                        {{ manager.last_name }}
                    </option>
                    {% endfor %}

                </select>

            </div>

            <div class="col-md-6 mb-3">
                <label>Date Of Joining</label>

                <input type="date"
                       name="date_of_joining"
                       value="{{ employee.date_of_joining|date:'Y-m-d' }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Username</label>

                <input type="text"
                       name="username"
                       value="{{ employee.username }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Password</label>

                <input type="text"
                       name="password"
                       value="{{ employee.password }}"
                       class="form-control">
            </div>

        </div>

        <button type="submit"
                class="btn btn-primary">
            Update Employee
        </button>

        <a href="{% url 'employee_dashboard' %}"
           class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>

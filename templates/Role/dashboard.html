<!DOCTYPE html>
<html>
<head>
    <title>Role Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Role Dashboard</h2>
<div class="mb-3">
    <a href="{% url 'create_role' %}" class="btn btn-primary mb-3">
        Add Role
    </a>
   <a href="{% url 'dashboard' %}" class="btn btn-secondary">
    Go to Departments
</a>
</div>
    

    <form method="GET" class="mb-3">
        <input type="text" name="search" placeholder="Search Role" class="form-control">
    </form>

    <table class="table table-bordered">

        <tr>
            <th>ID</th>
            <th>Role Name</th>
            <th>Description</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>

        {% for role in roles %}

        <tr>
            <td>{{ role.id }}</td>
            <td>{{ role.role_name }}</td>
            <td>{{ role.description }}</td>

            <td>
                <a href="{% url 'update_role' role.id %}"
                   class="btn btn-warning">
                    Edit
                </a>
            </td>

            <td>
                <a href="{% url 'delete_role' role.id %}"
                   class="btn btn-danger">
                    Delete
                </a>
            </td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Update Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h3>Update Task</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        Task Title
                    </label>

                    <input
                        type="text"
                        name="task_title"
                        value="{{ task.task_title }}"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Task Description
                    </label>

                    <textarea
                        name="task_description"
                        class="form-control"
                        rows="4"
                        required>{{ task.task_description }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Task Priority
                    </label>

                    <select
                        name="task_priority"
                        class="form-control">

                        <option value="High" {% if task.task_priority == 'High' %}selected{% endif %}>
                            High
                        </option>

                        <option value="Medium" {% if task.task_priority == 'Medium' %}selected{% endif %}>
                            Medium
                        </option>

                        <option value="Low" {% if task.task_priority == 'Low' %}selected{% endif %}>
                            Low
                        </option>

                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Start Date
                    </label>

                    <input
                        type="date"
                        name="start_date"
                        value="{{ task.start_date|date:'Y-m-d' }}"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        End Date
                    </label>

                    <input
                        type="date"
                        name="end_date"
                        value="{{ task.end_date|date:'Y-m-d' }}"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Task Type
                    </label>

                    <select
                        name="task_type"
                        class="form-control">

                        <option value="Individual" {% if task.task_type == 'Individual' %}selected{% endif %}>
                            Individual
                        </option>

                        <option value="Team" {% if task.task_type == 'Team' %}selected{% endif %}>
                            Team
                        </option>

                    </select>
                </div>

                <button
                    type="submit"
                    class="btn btn-warning">

                    Update Task

                </button>

                <a href="{% url 'task_dashboard' %}"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>

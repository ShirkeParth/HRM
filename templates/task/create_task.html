<!DOCTYPE html>
<html>
<head>

<title>Create Task</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header">
<h3>Create Task</h3>
</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<label>Task Title</label>
<input type="text"
       name="task_title"
       class="form-control"
       required>

<br>

<label>Task Description</label>

<textarea
name="task_description"
class="form-control"
required>
</textarea>

<br>

<label>Priority</label>

<select
name="task_priority"
class="form-control">

<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>

<br>

<label>Start Date</label>

<input
type="date"
name="start_date"
class="form-control">

<br>

<label>End Date</label>

<input
type="date"
name="end_date"
class="form-control">

<br>

<label>Task Type</label>

<select
name="task_type"
class="form-control">

<option>Individual</option>
<option>Team</option>

</select>

<br>

<button
class="btn btn-primary">

Create Task

</button>

</form>

</div>

</div>

</div>

</body>
</html>

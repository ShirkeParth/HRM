<!DOCTYPE html>
<html>
<head>

<title>Department Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Department Dashboard</h2>

<div class="mb-3">
    <a href="{% url 'create_department' %}" class="btn btn-primary">
        Add Department
    </a>

    <a href="{% url 'role_dashboard' %}" class="btn btn-success">
        Go to Role Management
    </a>

    <a href="{% url 'employee_dashboard' %}" class="btn btn-info">
        Go to Employee Management
    </a>
</div>

<form method="GET">

<input
type="text"
name="search"
placeholder="Search Department"
class="form-control mb-3">

</form>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Description</th>
<th>Edit</th>
<th>Delete</th>
</tr>

{% for d in departments %}

<tr>

<td>{{ d.dept_id }}</td>
<td>{{ d.dept_name }}</td>
<td>{{ d.description }}</td>

<td>

<a href="{% url 'update_department' d.dept_id %}"
class="btn btn-warning">

Edit

</a>

</td>

<td>

<a href="{% url 'delete_department' d.dept_id %}"
class="btn btn-danger">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
